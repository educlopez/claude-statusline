name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: Lint shell scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: koalaman/shellcheck-action@v1
        with:
          version: v0.10.0
        env:
          SHELLCHECK_OPTS: ""

  test:
    name: Run bats tests
    runs-on: ubuntu-latest
    needs: shellcheck

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install bats and helpers
        run: |
          git clone --depth 1 https://github.com/bats-core/bats-core.git /tmp/bats-core
          sudo /tmp/bats-core/install.sh /usr/local

          mkdir -p test/lib
          git clone --depth 1 https://github.com/bats-core/bats-support.git test/lib/bats-support
          git clone --depth 1 https://github.com/bats-core/bats-assert.git test/lib/bats-assert

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Run tests
        run: bats test/*.bats
